# ==============================
#  API GATEWAY APPLICATION
# ==============================
spring:
  application:
    name: api-gateway

  profiles:
    active: dev

#  # ==============================
#  #  REDIS CONFIGURATION
#  # ==============================
#  data:
#    redis:
#      host: localhost
#      port: 6379
#      password:
#      timeout: 2000ms
#      lettuce:
#        pool:
#          max-active: 8
#          max-idle: 8
#          min-idle: 0

  # ==============================
  # API GATEWAY ROUTES
  # ==============================
  cloud:
    gateway:
      server:
        webflux:

          # ----------------------
          #  SERVICE DISCOVERY
          # ----------------------
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          # ----------------------
          #  ROUTES CONFIGURATION
          # ----------------------
          routes:

            #  AUTH SERVICE
            - id: auth-service
              uri: http://localhost:8003
              predicates:
                - Path=/api/auth/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: authService
                    fallbackUri: forward:/fallback/auth
                - StripPrefix=0

            #  USER SERVICE
            - id: user-service
              uri: http://localhost:8003
              predicates:
                - Path=/api/users/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: userService
                    fallbackUri: forward:/fallback/users
                - StripPrefix=0

            #  PRODUCT SERVICE
            - id: product-service
              uri: http://localhost:8001
              predicates:
                - Path=/api/products/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: productService
                    fallbackUri: forward:/fallback/products
                - StripPrefix=0

            # 📦 ORDER SERVICE
            - id: order-service
              uri: http://localhost:8002
              predicates:
                - Path=/api/orders/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: orderService
                    fallbackUri: forward:/fallback/orders
                - StripPrefix=0


# ==============================
# SERVER CONFIGURATION
# ==============================
server:
  port: 8080


# ==============================
#  JWT CONFIGURATION
# ==============================
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  access-token-expiration: 900000


# ==============================
#  LOGGING CONFIGURATION
# ==============================
logging:
  level:
    com.example.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG


# ==============================
#  MANAGEMENT / ACTUATOR
# ==============================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    gateway:
      enabled: true


# ==============================
#  EUREKA CONFIGURATION
# ==============================
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/